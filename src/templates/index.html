<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polla Mundialista 2026 - Tablero</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="content">
        <header class="top-nav">
            <div class="logo-seccion">
                <img src="{{ url_for('static', filename='../static/logo-repsol.svg') }}" alt="Logo" class="logo-img">
                <div class="divisor-vertical"></div>
                <h2>Polla Mundialista 2026</h2>
            </div>
            <div class="nav-acciones">
                <a href="#" class="btn-apuesta">Apuesta aquí</a>
            </div>
        </header>

        <div class="dashboard-grid">
            <div class="columna-partidos">
                <div id="contenedor-principal"></div>
                <h3 class="section-title">Resto de la jornada</h3>
                <div id="contenedor-otros" class="other-matches"></div>
            </div>

            <div class="columna-grupos">
                <h3 class="section-title" id="titulo-columna-derecha">Posiciones de Grupos</h3>
                <div class="scroll-grupos" id="contenedor-grupos"></div>
            </div>
        </div>
    </main>

    <script>
        function traducirEstado(status) {
            const estados = { 'scheduled': 'Programado', 'live': 'En Curso', 'completed': 'Finalizado' };
            return estados[status.toLowerCase()] || status;
        }

        function traducirRonda(round) {
            const rondas = { 'round': 'Fase de Grupos', 'r32': 'Dieciseisavos', 'r16': 'Octavos', 'qf': 'Cuartos', 'sf': 'Semifinal', 'final': 'Final' };
            return rondas[round.toLowerCase()] || round;
        }

        function cargarDatos() {
            fetch('/api/datos_tablero')
                .then(res => res.json())
                .then(datos => {
                    renderizarPrincipal(datos.principal);
                    renderizarOtros(datos.otros);
                    
                    const tituloDerecho = document.getElementById('titulo-columna-derecha');
                    
                    if (datos.es_fase_grupos) {
                        tituloDerecho.innerText = "Posiciones de Grupos";
                        renderizarGrupos(datos.grupos);
                    } else {
                        const nombreRonda = datos.partidos_eliminatoria.length > 0 ? traducirRonda(datos.partidos_eliminatoria[0].round) : "Fase Final";
                        tituloDerecho.innerText = "Cruces: " + nombreRonda;
                        renderizarEliminatorias(datos.partidos_eliminatoria);
                    }
                })
                .catch(err => console.error("Error al cargar:", err));
        }

        function renderizarPrincipal(partido) {
            const contenedor = document.getElementById('contenedor-principal');
            if (!partido) {
                contenedor.innerHTML = '<div class="hero-match"><p>No hay partidos programados para hoy.</p></div>';
                return;
            }
            // Aquí usamos los valores forzados a 0
            const g1 = partido.home_score !== null ? partido.home_score : 0;
            const g2 = partido.away_score !== null ? partido.away_score : 0;
            const estado = traducirEstado(partido.status);
            const hora = partido.hora_peru || ''; 
            const faseText = partido.group_name ? `Grupo ${partido.group_name}` : traducirRonda(partido.round);

            contenedor.innerHTML = `
                <section class="hero-match">
                    <div class="match-status">${estado} ${estado === 'Programado' ? ' - ' + hora : ''}</div>
                    <div class="scoreboard">
                        <div class="team"><h2>${partido.home_team || 'Por Clasificar'}</h2><p class="meta">${faseText}</p></div>
                        <div class="score-center">
                            <div class="score"><span>${g1}</span><span class="divider">-</span><span>${g2}</span></div>
                            <div class="tournament-badge">MUNDIAL 2026</div>
                        </div>
                        <div class="team"><h2>${partido.away_team || 'Por Clasificar'}</h2><p class="meta">${faseText}</p></div>
                    </div>
                </section>
            `;
        }

        function renderizarOtros(partidos) {
            const contenedor = document.getElementById('contenedor-otros');
            let html = '';

            partidos.forEach(p => {
                const g1 = p.home_score !== null ? p.home_score : '-';
                const g2 = p.away_score !== null ? p.away_score : '-';
                const infoFase = p.group_name ? `Grupo ${p.group_name}` : traducirRonda(p.round);
                
                const fechaMostrar = p.fecha_peru_str || "";

                html += `
                    <div class="match-card">
                        <div class="card-header">
                            <span class="fase-tag">${infoFase}</span>
                            <span class="fecha-hora-tag">${fechaMostrar} • ${p.hora_peru}</span>
                        </div>
                        <div class="card-teams">
                            <div class="team-row">
                                <span class="team-name">${p.home_team}</span>
                                <span class="score">${g1}</span>
                            </div>
                            <div class="team-row">
                                <span class="team-name">${p.away_team}</span>
                                <span class="score">${g2}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            contenedor.innerHTML = html;
        }
        
        function renderizarGrupos(grupos) {
            const contenedor = document.getElementById('contenedor-grupos');
            let html = '';
            grupos.forEach(grupo => {
                let filas = '';
                grupo.equipos.forEach((eq, index) => {
                    filas += `<tr><td>${index + 1}</td><td class="team-cell-name">${eq.nombre}</td><td>${eq.pj}</td><td>${eq.dg}</td><td>${eq.pts}</td></tr>`;
                });
                html += `
                    <div class="tabla-grupo-container">
                        <div class="titulo-grupo">${grupo.nombre}</div>
                        <table class="tabla-grupo">
                            <thead>
                                <tr><th>#</th><th>Equipo</th><th>PJ</th><th>DG</th><th>Pts</th></tr>
                            </thead>
                        <tbody>${filas}</tbody></table>
                    </div>
                `;
            });
            contenedor.innerHTML = html;
        }

        function renderizarEliminatorias(partidos) {
            const contenedor = document.getElementById('contenedor-grupos');
            let html = '';
            partidos.forEach(p => {
                const g1 = p.home_score !== null ? p.home_score : 0;
                const g2 = p.away_score !== null ? p.away_score : 0;
                html += `
                    <div class="match-card knockout-card">
                        <div class="card-status">${p.hora_peru || ''}</div>
                        <div class="card-teams knockout-teams">
                            <span class="team-name knockout-home">${p.home_team || 'TBD'}</span>
                            <span class="card-score">${g1} : ${g2}</span>
                            <span class="team-name knockout-away">${p.away_team || 'TBD'}</span>
                        </div>
                    </div>
                `;
            });
            contenedor.innerHTML = html;
        }

        cargarDatos();
        setInterval(cargarDatos, 60000);
    </script>
</body>
</html>
